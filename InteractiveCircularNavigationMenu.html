<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Navigation Menu</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .menu {
            position: relative;
            width: 320px;
            height: 320px;
        }

        .menu ul {
            width: 100%;
            height: 100%;
            list-style: none;
            position: relative;
        }

        .menu li {
            position: absolute;
            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);
            transition: .6s ease;
        }

        .menu.active li {
            transform:
                translate(-50%, -50%) rotate(var(--angle)) translateX(120px);
        }

        .menu li a {

            width: 60px;
            height: 60px;

            display: flex;
            justify-content: center;
            align-items: center;

            text-decoration: none;
            border-radius: 50%;

            color: #fff;
            font-size: 22px;

            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(255, 255, 255, .2);

            transition: .5s;

            box-shadow: 0 10px 20px rgba(0, 0, 0, .25);
        }

        /* Keep icons upright */

        .menu.active li a {
            transform: rotate(calc(-1 * var(--angle)));
        }

        .menu li a:hover {

            transform:
                rotate(calc(-1 * var(--angle))) scale(1.15);

            background: #00eaff;
            color: #111;

            box-shadow:
                0 0 20px #00eaff,
                0 0 50px #00eaff;
        }

        .toggle {

            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            width: 80px;
            height: 80px;

            border-radius: 50%;

            background: #fff;

            display: flex;
            justify-content: center;
            align-items: center;

            cursor: pointer;

            font-size: 30px;

            z-index: 1000;

            transition: .5s;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .3);
        }

        .menu.active .toggle {

            transform:
                translate(-50%, -50%) rotate(315deg);

            background: #00eaff;
            color: #111;
        }

        .toggle:hover {

            transform:
                translate(-50%, -50%) scale(1.05);
        }

        .menu.active .toggle:hover {

            transform:
                translate(-50%, -50%) rotate(315deg) scale(1.05);
        }

        /* Floating */

        @keyframes float {

            0%,
            100% {
                translate: 0 0;
            }

            50% {
                translate: 0 -8px;
            }

        }

        .menu li a {
            animation: float 3s infinite ease-in-out;
        }

        .menu li:nth-child(2) a {
            animation-delay: .2s;
        }

        .menu li:nth-child(3) a {
            animation-delay: .4s;
        }

        .menu li:nth-child(4) a {
            animation-delay: .6s;
        }

        .menu li:nth-child(5) a {
            animation-delay: .8s;
        }

        .menu li:nth-child(6) a {
            animation-delay: 1s;
        }

        .menu li:nth-child(7) a {
            animation-delay: 1.2s;
        }

        .menu li:nth-child(8) a {
            animation-delay: 1.4s;
        }

        @media(max-width:600px) {

            .menu {
                width: 280px;
                height: 280px;
            }

            .menu.active li {

                transform:
                    translate(-50%, -50%) rotate(var(--angle)) translateX(95px);
            }

            .menu li a {
                width: 55px;
                height: 55px;
            }

            .toggle {
                width: 70px;
                height: 70px;
            }

        }
    </style>
</head>

<body>

    <div class="menu">

        <div class="toggle">
            <i class="fa-solid fa-plus"></i>
        </div>

        <ul>

            <li style="--angle:0deg;">
                <a href="#"><i class="fa-solid fa-house"></i></a>
            </li>

            <li style="--angle:45deg;">
                <a href="#"><i class="fa-solid fa-user"></i></a>
            </li>

            <li style="--angle:90deg;">
                <a href="#"><i class="fa-solid fa-image"></i></a>
            </li>

            <li style="--angle:135deg;">
                <a href="#"><i class="fa-solid fa-heart"></i></a>
            </li>

            <li style="--angle:180deg;">
                <a href="#"><i class="fa-solid fa-envelope"></i></a>
            </li>

            <li style="--angle:225deg;">
                <a href="#"><i class="fa-solid fa-gear"></i></a>
            </li>

            <li style="--angle:270deg;">
                <a href="#"><i class="fa-solid fa-camera"></i></a>
            </li>

            <li style="--angle:315deg;">
                <a href="#"><i class="fa-solid fa-phone"></i></a>
            </li>

        </ul>

    </div>

    <!-- <script src="script.js"></script> -->
    <script>
        const menu = document.querySelector(".menu");
        const toggle = document.querySelector(".toggle");

        toggle.addEventListener("click", () => {
            menu.classList.toggle("active");
        });
    </script>

</body>

</html>
