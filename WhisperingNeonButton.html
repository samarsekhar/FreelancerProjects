<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispering Neon Button</title>
<!-- <link rel="stylesheet" href="style.css"> -->
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
}

.neon-btn{
    position:relative;
    padding:18px 60px;
    border:none;
    background:transparent;
    cursor:pointer;
    border-radius:50px;
    overflow:hidden;
    isolation:isolate;
}

/* Neon Border */
.neon-btn::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50px;
    padding:2px;
    background:linear-gradient(
        90deg,
        #00f7ff,
        #7d2cff,
        #00f7ff
    );
    background-size:300% 100%;
    animation:borderMove 5s linear infinite;

    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
}

/* Glow */
.neon-btn::after{
    content:"";
    position:absolute;
    inset:-10px;
    border-radius:50px;
    background:linear-gradient(
        90deg,
        #00f7ff,
        #7d2cff
    );
    filter:blur(25px);
    opacity:.6;
    z-index:-1;
    animation:pulse 3s ease-in-out infinite;
}

.neon-btn span{
    position:relative;
    display:block;
    color:#fff;
    font-size:1.2rem;
    letter-spacing:5px;
    font-weight:700;
    text-transform:uppercase;
    text-shadow:
      0 0 10px #00f7ff,
      0 0 20px #00f7ff,
      0 0 40px #00f7ff;
}

/* Whispering Light Sweep */
.neon-btn span::before{
    content:"";
    position:absolute;
    top:-10px;
    left:-120%;
    width:60px;
    height:180%;
    background:linear-gradient(
      90deg,
      transparent,
      rgba(255,255,255,.9),
      transparent
    );
    transform:skewX(-25deg);
    animation:whisper 3s ease-in-out infinite;
}

.neon-btn:hover{
    transform:translateY(-4px) scale(1.05);
}

.neon-btn:hover::after{
    opacity:1;
}

@keyframes borderMove{
    0%{
        background-position:0% 50%;
    }
    100%{
        background-position:300% 50%;
    }
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:.5;
    }
    50%{
        transform:scale(1.08);
        opacity:1;
    }
}

@keyframes whisper{
    0%{
        left:-120%;
        opacity:0;
    }
    20%{
        opacity:1;
    }
    50%{
        opacity:.8;
    }
    100%{
        left:130%;
        opacity:0;
    }
}
</style>
</head>
<body>

<button class="neon-btn">
  <span>WHISPER</span>
</button>

</body>
</html>
