<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Hover Zoom</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111827;
    font-family:Arial, sans-serif;
}

.card{
    width:400px;
    height:260px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform 0.8s ease;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.8),
        transparent
    );
    opacity:0;
    transition:0.5s;
    z-index:1;
}

.content{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
    z-index:2;
    transform:translateY(40px);
    opacity:0;
    transition:0.5s;
}

.content h2{
    font-size:28px;
    margin-bottom:8px;
}

.content p{
    font-size:14px;
    line-height:1.5;
}

.card:hover img{
    transform:scale(1.2);
}

.card:hover::before{
    opacity:1;
}

.card:hover .content{
    transform:translateY(0);
    opacity:1;
}
  
 /*  .card{
    perspective:1000px;
  }
  
  .card img{
    transition:1s ease;
  }
  
  .card:hover img{
    transform:scale(1.25) rotate(3deg);
  } */
</style>
</head>
<body>

<div class="card">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200" alt="Nature">
    
    <div class="content">
        <h2>Nature View</h2>
        <p>Beautiful animated image zoom effect using pure CSS.</p>
    </div>
</div>

</body>
</html>
