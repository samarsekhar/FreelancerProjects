<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Card Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a0533;
    --surface: #26075c;
    --card-back: #3d0d8a;
    --card-border: #6020c0;
    --gold: #ffd700;
    --neon: #c084fc;
    --text: #f0e8ff;
    --muted: #9a78c0;
  }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 30% 20%, #2d0a6a 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, #0a1560 0%, transparent 50%);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1rem;
  }
  .header { text-align: center; margin-bottom: 1.5rem; }
  h1 {
    font-size: clamp(1.8rem, 7vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4f9a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }
  .stats {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 0.6rem 1.2rem;
    text-align: center;
    min-width: 90px;
  }
  .stat-val { font-size: 1.4rem; font-weight: 800; color: var(--gold); }
  .stat-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .difficulty {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .diff-btn {
    background: var(--surface);
    border: 1px solid var(--card-border);
    color: var(--muted);
    padding: 0.45rem 1rem;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .diff-btn.active, .diff-btn:hover { background: var(--neon); color: var(--bg); border-color: var(--neon); }

  .grid {
    display: grid;
    gap: 0.7rem;
    margin-bottom: 1.5rem;
    width: 100%;
    max-width: 480px;
  }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-5 { grid-template-columns: repeat(5, 1fr); }
  .grid-6 { grid-template-columns: repeat(6, 1fr); }

  .card-wrap {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 12px;
  }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-wrap.matched .card-inner { transform: rotateY(180deg); }
  .card-wrap.matched .card-front { background: linear-gradient(135deg, #2d7a4e, #1a5c38); border-color: #3ddc84; }
  .card-wrap.matched { cursor: default; }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    font-size: clamp(1.2rem, 5vw, 2rem);
    border: 2px solid;
  }
  .card-back {
    background: var(--card-back);
    border-color: var(--card-border);
    font-size: clamp(1rem, 4vw, 1.6rem);
  }
  .card-back::before { content: '✦'; color: var(--neon); opacity: 0.6; }
  .card-front {
    background: var(--surface);
    border-color: var(--card-border);
    transform: rotateY(180deg);
  }

  .card-wrap.shake .card-inner { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-4px); }
    75% { transform: rotateY(180deg) translateX(4px); }
  }

  .card-wrap.matched .card-inner { animation: celebrate 0.4s ease; }
  @keyframes celebrate {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .restart-btn {
    background: linear-gradient(135deg, #c084fc, #818cf8);
    color: #fff;
    border: none;
    padding: 0.85rem 2.5rem;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(192,132,252,0.35);
    letter-spacing: 0.03em;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(192,132,252,0.5); }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,5,51,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
    text-align: center;
    padding: 2rem;
  }
  .win-overlay.show { display: flex; animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; } }
  .win-emoji { font-size: 4rem; margin-bottom: 1rem; animation: bounce 0.6s ease; }
  @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  .win-title { font-size: clamp(2rem, 8vw, 3rem); font-weight: 900; color: var(--gold); margin-bottom: 0.5rem; }
  .win-stats { color: var(--muted); font-size: 1rem; margin-bottom: 2rem; }
</style>
</head>
<body>
<div class="header">
  <h1>✦ Memory ✦</h1>
</div>

<div class="stats">
  <div class="stat-box"><div class="stat-val" id="movesEl">0</div><div class="stat-label">Moves</div></div>
  <div class="stat-box"><div class="stat-val" id="timerEl">0:00</div><div class="stat-label">Time</div></div>
  <div class="stat-box"><div class="stat-val" id="pairsEl">0/0</div><div class="stat-label">Pairs</div></div>
</div>

<div class="difficulty">
  <button class="diff-btn" onclick="startGame(4)" data-d="4">Easy</button>
  <button class="diff-btn active" onclick="startGame(5)" data-d="5">Medium</button>
  <button class="diff-btn" onclick="startGame(6)" data-d="6">Hard</button>
</div>

<div class="grid grid-5" id="grid"></div>
<button class="restart-btn" onclick="startGame(currentDifficulty)">↺ Restart</button>

<div class="win-overlay" id="winOverlay">
  <div class="win-emoji">🎉</div>
  <div class="win-title">You Win!</div>
  <div class="win-stats" id="winStats"></div>
  <button class="restart-btn" onclick="closeWin()">Play Again</button>
</div>

<script>
  const emojis = ['🦊','🐬','🦋','🌺','🎸','🍕','🚀','🎯','🦄','🌈','⚡','🎭','🍀','🔮','🦁','🐉','🌙','🎪','🎨','🏆','💎','🎲','🌊','🦅'];
  let flipped=[], matched=[], moves=0, pairs=0, currentDifficulty=5, timer=null, seconds=0, canFlip=true;

  function startGame(d) {
    currentDifficulty = d;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.d == d));
    const total = d * d;
    const numPairs = Math.floor(total / 2);
    pairs = numPairs;
    moves = 0; matched = []; flipped = []; seconds = 0; canFlip = true;
    clearInterval(timer);
    document.getElementById('movesEl').textContent = 0;
    document.getElementById('timerEl').textContent = '0:00';
    document.getElementById('pairsEl').textContent = `0/${numPairs}`;
    document.getElementById('winOverlay').classList.remove('show');

    const gridEl = document.getElementById('grid');
    gridEl.className = `grid grid-${d}`;

    const pool = emojis.slice(0, numPairs);
    const deck = [...pool, ...pool];
    if (total % 2 !== 0) deck.push('⭐');
    for (let i = deck.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [deck[i],deck[j]] = [deck[j],deck[i]]; }

    gridEl.innerHTML = deck.map((e,i) => `
      <div class="card-wrap" data-idx="${i}" data-emoji="${e}" onclick="flipCard(this)">
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${e}</div>
        </div>
      </div>`).join('');

    timer = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds/60), s = seconds%60;
      document.getElementById('timerEl').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
  }

  function flipCard(card) {
    if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched') || flipped.length >= 2) return;
    card.classList.add('flipped');
    flipped.push(card);
    if (flipped.length === 2) {
      moves++;
      document.getElementById('movesEl').textContent = moves;
      canFlip = false;
      if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
        flipped[0].classList.add('matched'); flipped[1].classList.add('matched');
        matched.push(flipped[0].dataset.emoji);
        document.getElementById('pairsEl').textContent = `${matched.length}/${pairs}`;
        flipped = []; canFlip = true;
        if (matched.length === pairs) setTimeout(showWin, 400);
      } else {
        setTimeout(() => {
          flipped[0].classList.add('shake'); flipped[1].classList.add('shake');
          setTimeout(() => {
            flipped.forEach(c => { c.classList.remove('flipped','shake'); });
            flipped = []; canFlip = true;
          }, 400);
        }, 800);
      }
    }
  }

  function showWin() {
    clearInterval(timer);
    const m = Math.floor(seconds/60), s = seconds%60;
    document.getElementById('winStats').textContent = `Completed in ${m}:${s.toString().padStart(2,'0')} with ${moves} moves`;
    document.getElementById('winOverlay').classList.add('show');
  }
  function closeWin() { startGame(currentDifficulty); }

  startGame(5);
</script>
</body>
</html>
